<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHD Talk - Walkie Talkie Sim</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2a2a2a; /* Dark, walkie-talkie style background */
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .walkie-talkie-container {
            border: 5px solid #444;
            border-radius: 20px;
            padding: 30px;
            background-color: #333;
            box-shadow: 0 12px 24px rgba(0,0,0,0.6);
            text-align: center;
            width: 350px;
            position: relative;
        }

        /* Simulates an antenna */
        .antenna {
            width: 20px;
            height: 80px;
            background-color: #111;
            position: absolute;
            top: -75px;
            right: 40px;
            border-top-left-radius: 5px;
            border-top-right-radius: 5px;
        }

        h1 {
            font-size: 1.5rem;
            margin-top: 0;
            color: #f60; /* Accent color from image */
        }

        p {
            font-size: 0.9rem;
            margin: 5px 0 20px;
            color: #ccc;
        }

        .status-display {
            margin: 15px 0;
            padding: 12px;
            background-color: #111;
            border: 2px solid #555;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.1s;
        }

        .status-standby {
            color: #888;
        }

        .status-transmitting {
            color: #f60; /* Transmitting color from image */
            text-shadow: 0 0 5px rgba(255,102,0,0.7);
        }

        /* Style for the button container */
        .ptt-button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            outline: none;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            display: inline-block;
        }

        /* Basic interaction feedback */
        .ptt-button:hover {
            transform: scale(1.02);
        }

        /* Styles for when the button is actively pushed */
        .ptt-button.active {
            transform: scale(0.96);
            box-shadow: 0 0 20px rgba(255,102,0,0.9);
            border-radius: 50%; /* Helps glow follow the circular image */
        }

        /* The actual image */
        .ptt-button img {
            display: block;
            max-width: 100%;
            height: auto;
            pointer-events: none; /* Allows click events to pass to the button parent */
        }
    </style>
</head>
<body>

    <div class="walkie-talkie-container">
        <div class="antenna"></div>
        
        <h1>RHD Talk Sim</h1>
        <p>A simple push-to-talk interface.</p>

        <div class="status-display status-standby" id="statusDisplay">
            STATUS: Standing By
        </div>

        <button class="ptt-button" id="pttButton">
            <img src="logo.png" alt="RHD Talk Push-to-Talk Image">
        </button>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const pttButton = document.getElementById('pttButton');
            const statusDisplay = document.getElementById('statusDisplay');
            let isTransmitting = false;

            // --- Functionality to start transmitting ---
            function startTransmission(e) {
                if (!isTransmitting) {
                    isTransmitting = true;
                    // Visual changes
                    pttButton.classList.add('active');
                    statusDisplay.textContent = 'STATUS: TRANSMITTING...';
                    statusDisplay.classList.remove('status-standby');
                    statusDisplay.classList.add('status-transmitting');
                    
                    // You would add audio capture code here (e.g., using MediaStream API)
                    console.log('Push-to-Talk started');
                }
            }

            // --- Functionality to stop transmitting ---
            function stopTransmission() {
                if (isTransmitting) {
                    isTransmitting = false;
                    // Restore visual state
                    pttButton.classList.remove('active');
                    statusDisplay.textContent = 'STATUS: Standing By';
                    statusDisplay.classList.add('status-standby');
                    statusDisplay.classList.remove('status-transmitting');
                    
                    // You would add audio stopping code here
                    console.log('Push-to-Talk stopped');
                }
            }

            // --- Multi-Device Event Handlers ---

            // Mouse Events (Desktop)
            pttButton.addEventListener('mousedown', startTransmission);
            pttButton.addEventListener('mouseup', stopTransmission);

            // Handle edge case: user pushes button but releases mouse outside the button area
            document.addEventListener('mouseup', function(event) {
                if (isTransmitting && event.target !== pttButton && !pttButton.contains(event.target)) {
                    stopTransmission();
                }
            });

            // Touch Events (Mobile/Tablet)
            pttButton.addEventListener('touchstart', function(e) {
                e.preventDefault(); // Prevents default browser actions like scrolling/context menus
                startTransmission();
            });
            pttButton.addEventListener('touchend', stopTransmission);
            pttButton.addEventListener('touchcancel', stopTransmission); // Handles touch interruptions like calls
        });
    </script>

</body>
</html>
