<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RHD Talk - Group Walkie Talkie</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2a2a2a; 
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .walkie-talkie-container {
            border: 5px solid #444;
            border-radius: 20px;
            padding: 30px;
            background-color: #333;
            box-shadow: 0 12px 24px rgba(0,0,0,0.6);
            text-align: center;
            width: 350px;
            position: relative;
        }

        .antenna {
            width: 20px;
            height: 80px;
            background-color: #111;
            position: absolute;
            top: -75px;
            right: 40px;
            border-top-left-radius: 5px;
            border-top-right-radius: 5px;
        }

        h1 {
            font-size: 1.5rem;
            margin-top: 0;
            color: #f60; 
        }

        p {
            font-size: 0.9rem;
            margin: 5px 0 15px;
            color: #ccc;
        }

        /* --- Connection Panel Styles --- */
        .connection-panel {
            background-color: #1a1a1a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
            font-size: 0.85rem;
            text-align: left;
            border: 1px solid #444;
        }

        .connection-panel input {
            width: calc(100% - 18px);
            padding: 8px;
            margin-top: 8px;
            margin-bottom: 10px;
            background: #333;
            color: white;
            border: 1px solid #555;
            border-radius: 4px;
        }

        .connection-panel button {
            background-color: #f60;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            transition: background 0.2s;
        }

        .connection-panel button:hover {
            background-color: #e55d00;
        }

        #my-id {
            color: #f60;
            font-family: monospace;
            font-size: 1rem;
            user-select: all;
            cursor: pointer;
            display: block;
            margin-top: 5px;
            background: #000;
            padding: 5px;
            text-align: center;
            border-radius: 4px;
        }

        .peer-list-container {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed #444;
        }

        .peer-list {
            list-style: none;
            padding: 0;
            margin: 5px 0 0 0;
            max-height: 80px;
            overflow-y: auto;
        }

        .peer-list li {
            background: #222;
            padding: 5px;
            border-radius: 4px;
            margin-bottom: 3px;
            font-family: monospace;
            font-size: 0.8rem;
            color: #0f0;
            display: flex;
            justify-content: space-between;
        }
        /* ---------------------------------- */

        .status-display {
            margin: 15px 0;
            padding: 12px;
            background-color: #111;
            border: 2px solid #555;
            border-radius: 8px;
            font-weight: bold;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: color 0.1s;
        }

        .status-standby { color: #888; }
        .status-ready { color: #0f0; text-shadow: 0 0 5px rgba(0,255,0,0.5); }
        .status-transmitting {
            color: #f60; 
            text-shadow: 0 0 5px rgba(255,102,0,0.7);
        }

        .ptt-button {
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
            outline: none;
            transition: transform 0.1s ease, box-shadow 0.1s ease;
            display: inline-block;
            border-radius: 50%;
        }

        .ptt-button:hover {
            transform: scale(1.02);
        }

        .ptt-button.active {
            transform: scale(0.96);
            box-shadow: 0 0 20px rgba(255,102,0,0.9);
        }

        .ptt-button img {
            display: block;
            max-width: 150px; 
            height: auto;
            pointer-events: none; 
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <div class="walkie-talkie-container">
        <div class="antenna"></div>
        
        <h1>RHD Talk Sim</h1>
        <p>Group Frequency Active</p>

        <div class="connection-panel">
            <div>Your Radio ID: <span id="my-id" title="Click to copy">Loading...</span></div>
            <input type="text" id="peer-id-input" placeholder="Enter a partner's ID to add them...">
            <button id="connect-btn">Add to Frequency</button>
            
            <div class="peer-list-container">
                <div style="font-size: 0.8rem; color: #888; text-transform: uppercase;">Connected Radios: <span id="connection-count">0</span></div>
                <ul class="peer-list" id="peer-list">
                    </ul>
            </div>
        </div>

        <div class="status-display status-standby" id="statusDisplay">
            STATUS: Offline
        </div>

        <button class="ptt-button" id="pttButton" disabled style="opacity: 0.5;">
            <img src="logo.png" alt="RHD Talk Push-to-Talk Image">
        </button>
        
        <div id="audio-container" style="display: none;"></div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const pttButton = document.getElementById('pttButton');
            const statusDisplay = document.getElementById('statusDisplay');
            const myIdDisplay = document.getElementById('my-id');
            const peerIdInput = document.getElementById('peer-id-input');
            const connectBtn = document.getElementById('connect-btn');
            const peerListUI = document.getElementById('peer-list');
            const connectionCountUI = document.getElementById('connection-count');
            const audioContainer = document.getElementById('audio-container');
            
            let isTransmitting = false;
            let localStream = null;
            let peer = null;
            
            // Track all active connections (Map allows us to easily add/remove by ID)
            const activeConnections = new Map();

            // 1. Initialize PeerJS
            peer = new Peer(); 

            peer.on('open', function(id) {
                myIdDisplay.textContent = id;
                updateStatusUI();
            });

            // 2. Get Microphone Permissions
            navigator.mediaDevices.getUserMedia({ audio: true, video: false })
                .then(function(stream) {
                    localStream = stream;
                    // Mute our own track immediately so we don't transmit until PTT is pressed
                    localStream.getAudioTracks()[0].enabled = false; 
                })
                .catch(function(err) {
                    console.error('Microphone access denied', err);
                    statusDisplay.textContent = 'MIC ERROR';
                    alert('Please allow microphone access to use the walkie-talkie.');
                });

            // 3. Handle Incoming Connections (Someone else adding you to their frequency)
            peer.on('call', function(call) {
                // Answer the call with our local stream
                call.answer(localStream);
                setupCallEvents(call);
            });

            // 4. Handle Outgoing Connections (You adding someone to your frequency)
            connectBtn.addEventListener('click', function() {
                const partnerId = peerIdInput.value.trim();
                
                if (!partnerId) {
                    alert('Please enter a Radio ID.');
                    return;
                }
                if (partnerId === peer.id) {
                    alert("You can't connect to yourself.");
                    return;
                }
                if (activeConnections.has(partnerId)) {
                    alert("You are already connected to this radio.");
                    peerIdInput.value = '';
                    return;
                }
                if (!localStream) {
                    alert('Microphone not ready yet.');
                    return;
                }

                statusDisplay.textContent = 'STATUS: Connecting...';
                const call = peer.call(partnerId, localStream);
                setupCallEvents(call);
                peerIdInput.value = ''; // clear input
            });

            // 5. Setup Call Events (Runs for every individual connection)
            function setupCallEvents(call) {
                // When we receive their audio stream
                call.on('stream', function(remoteStream) {
                    // Prevent duplicate audio elements if stream event fires twice (browser quirk)
                    if (document.getElementById('audio-' + call.peer)) return;

                    // Create a dedicated audio element for this specific person
                    const audioEl = document.createElement('audio');
                    audioEl.id = 'audio-' + call.peer;
                    audioEl.autoplay = true;
                    audioEl.srcObject = remoteStream;
                    audioContainer.appendChild(audioEl);
                    
                    // Add them to our active connections list
                    activeConnections.set(call.peer, call);
                    updateUI();
                });

                // When they disconnect
                call.on('close', function() {
                    removeConnection(call.peer);
                });

                // Failsafe for errors/disconnects
                call.on('error', function() {
                    removeConnection(call.peer);
                });
            }

            // Helper to clean up when someone leaves
            function removeConnection(peerId) {
                activeConnections.delete(peerId);
                const audioEl = document.getElementById('audio-' + peerId);
                if (audioEl) audioEl.remove();
                updateUI();
            }

            // Helper to update the UI based on connection count
            function updateUI() {
                // Update Peer List
                peerListUI.innerHTML = '';
                activeConnections.forEach((call, id) => {
                    const li = document.createElement('li');
                    li.textContent = id;
                    peerListUI.appendChild(li);
                });
                
                // Update Count
                const count = activeConnections.size;
                connectionCountUI.textContent = count;

                updateStatusUI();
            }

            function updateStatusUI() {
                if (isTransmitting) return; // Don't interrupt the transmitting visual

                if (activeConnections.size > 0) {
                    statusDisplay.textContent = 'STATUS: ' + activeConnections.size + ' CONNECTED';
                    statusDisplay.className = 'status-display status-ready';
                    pttButton.disabled = false;
                    pttButton.style.opacity = '1';
                } else {
                    statusDisplay.textContent = 'STATUS: Standing By';
                    statusDisplay.className = 'status-display status-standby';
                    pttButton.disabled = true;
                    pttButton.style.opacity = '0.5';
                }
            }

            // --- Functionality to start transmitting to EVERYONE ---
            function startTransmission(e) {
                if (!isTransmitting && activeConnections.size > 0 && localStream) {
                    isTransmitting = true;
                    
                    // Unmute microphone track. Because all calls share this localStream,
                    // everyone will instantly start hearing you.
                    localStream.getAudioTracks()[0].enabled = true;

                    // Visual changes
                    pttButton.classList.add('active');
                    statusDisplay.textContent = 'STATUS: TRANSMITTING...';
                    statusDisplay.className = 'status-display status-transmitting';
                }
            }

            // --- Functionality to stop transmitting ---
            function stopTransmission() {
                if (isTransmitting && localStream) {
                    isTransmitting = false;
                    
                    // Mute microphone track again
                    localStream.getAudioTracks()[0].enabled = false;

                    // Restore visual state
                    pttButton.classList.remove('active');
                    updateStatusUI();
                }
            }

            // Click to copy ID helper
            myIdDisplay.addEventListener('click', function() {
                navigator.clipboard.writeText(this.textContent);
                const originalText = this.textContent;
                this.textContent = 'Copied!';
                setTimeout(() => { this.textContent = originalText; }, 1500);
            });

            // --- Multi-Device Event Handlers ---

            // Mouse Events
            pttButton.addEventListener('mousedown', startTransmission);
            pttButton.addEventListener('mouseup', stopTransmission);
            pttButton.addEventListener('mouseleave', stopTransmission);

            // Touch Events
            pttButton.addEventListener('touchstart', function(e) {
                e.preventDefault(); 
                startTransmission();
            });
            pttButton.addEventListener('touchend', stopTransmission);
            pttButton.addEventListener('touchcancel', stopTransmission); 
        });
    </script>
</body>
</html>
